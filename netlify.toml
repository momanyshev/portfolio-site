[build]
  publish = "site"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/issues/:id"
  to = "/.netlify/functions/issues/:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/issues"
  to = "/.netlify/functions/issues"
  status = 200
  force = true

[dev]
  framework = "#static"
  publish = "site"
  port = 8888
  autoLaunch = false
