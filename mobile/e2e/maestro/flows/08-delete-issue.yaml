appId: ru.maksim.qalab
name: 08 — Удаление дефекта
tags:
  - smoke
  - crud
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Дефектов пока нет"
    timeout: 20000
- tapOn:
    id: create-issue-button
- tapOn:
    id: issue-title-input
- inputText: "Maestro delete defect"
- tapOn:
    id: issue-description-input
- inputText: "Issue will be removed by Maestro"
- hideKeyboard
- tapOn:
    text: "^Создать$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект создан."
    timeout: 15000
- scrollUntilVisible:
    element: "Удалить дефект «Maestro delete defect»"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 80
- tapOn: "Удалить дефект «Maestro delete defect»"
- assertVisible:
    id: delete-issue-modal
- assertVisible: "Дефект «Maestro delete defect» будет удалён безвозвратно."
- tapOn:
    text: "^Удалить$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект удалён."
    timeout: 15000
- assertNotVisible: "Maestro delete defect"
- assertVisible: "Дефектов пока нет"
