appId: ru.maksim.qalab
name: 05 — Редактирование дефекта
tags:
  - smoke
  - crud
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Дефектов пока нет"
    timeout: 20000
- tapOn:
    id: create-issue-button
- tapOn:
    id: issue-title-input
- inputText: "Maestro edit defect"
- tapOn:
    id: issue-description-input
- inputText: "Description before Maestro editing"
- hideKeyboard
- tapOn:
    text: "^Создать$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект создан."
    timeout: 15000
- scrollUntilVisible:
    element: "Редактировать дефект «Maestro edit defect»"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 80
- tapOn: "Редактировать дефект «Maestro edit defect»"
- extendedWaitUntil:
    visible:
      id: issue-form-modal
    timeout: 15000
- assertVisible: "Редактировать дефект"
- tapOn:
    id: issue-title-input
- eraseText
- inputText: "Maestro edited defect"
- hideKeyboard
- tapOn:
    text: "^Сохранить$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект обновлён."
    timeout: 15000
- scrollUntilVisible:
    element: "Maestro edited defect"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- assertVisible: "Maestro edited defect"
- assertNotVisible: "Maestro edit defect"
