appId: ru.maksim.qalab
name: 04 — Просмотр дефекта
tags:
  - smoke
  - crud
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Дефектов пока нет"
    timeout: 20000
- tapOn:
    id: create-issue-button
- tapOn:
    id: issue-title-input
- inputText: "Maestro view defect"
- tapOn:
    id: issue-description-input
- inputText: "Full description for issue details"
- hideKeyboard
- tapOn:
    text: "^Создать$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект создан."
    timeout: 15000
- scrollUntilVisible:
    element: "Открыть дефект «Maestro view defect»"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 80
- tapOn: "Открыть дефект «Maestro view defect»"
- extendedWaitUntil:
    visible:
      id: issue-details-modal
    timeout: 15000
- assertVisible: "Maestro view defect"
- assertVisible: "Full description for issue details"
- assertVisible: "ID"
- assertVisible: "Создан"
- assertVisible: "Обновлён"
- tapOn:
    text: "^Закрыть$"
    index: 0
- assertNotVisible:
    id: issue-details-modal
