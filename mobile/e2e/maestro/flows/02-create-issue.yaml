appId: ru.maksim.qalab
name: 02 — Создание дефекта
tags:
  - smoke
  - crud
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Дефектов пока нет"
    timeout: 20000
- tapOn:
    id: create-issue-button
- assertVisible:
    id: issue-form-modal
- tapOn:
    id: issue-title-input
- inputText: "Maestro create defect"
- tapOn:
    id: issue-description-input
- inputText: "Created from Maestro mobile flow"
- hideKeyboard
- tapOn:
    text: "^Создать$"
    enabled: true
- extendedWaitUntil:
    visible: "Дефект создан."
    timeout: 15000
- scrollUntilVisible:
    element: "Maestro create defect"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- assertVisible: "Maestro create defect"
- assertVisible: "Средняя"
- assertVisible: "Открыт"
